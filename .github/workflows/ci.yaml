name: ci yaml

on: 
    push:
        branches: [main]
env:
    AWS_REGION: ap-south-1
    ECR_REPO: product-catalog        
       
jobs:
    build:
      runs-on: ubuntu-latest
      steps:
        - name: checkout
          uses: actions/checkout@v6
        - name: setup go
          uses: actions/setup-go@v6
          with:
            go-version: '1.22' 
        - name: download dependencies
          run: |
                go mod download
                go build -o product-catalog-service main.go
        - name: run tests
          run: go test ./...
        # - name: run lint
        #   uses: golangci/golangci-lint-action@v6
        #   with:
        #     version: v1.55.2
        - name: upload artifact
          uses: actions/upload-artifact@v7
          with:
            name: my-artifact
            path: product-catalog   
    # docker-build:
    #   needs: build
    #   runs-on: ubuntu-latest
    #   steps:
    #     - name: checkout
    #       uses: actions/checkout@v6
    #     - name: download artifact
    #       uses: actions/download-artifact@v8
    #       with: 
    #         name: my-artifact
    #         path: product-catalog
        - name: install docker
          uses: docker/setup-buildx-action@v4    
        - name: configure aws
          uses: aws-actions/configure-aws-credentials@v6.1.0
          with:
            aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
            aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            aws-region: ${{env.AWS_REGION}} 
        - name: login-ecr
          run: aws ecr get-login-passwd --region ${{env.AWS_REGION}} | docker login --username AWS --password-stdin ${{vars.ACCOUNT_ID}}.dkr.ecr.${{env.AWS_REGION}}.amazonaws.com         
        - name: build with docker
          run: docker build -t ${{vars.ACCOUNT_ID}}.dkr.ecr.${{env.AWS_REGION}}.amazonaws.com/${{env.ECR_REPO}}:${{github.run_number}} .
        - name: push to ecr
          run: docker push ${{vars.ACCOUNT_ID}}.dkr.ecr.${{env.AWS_REGION}}.amazonaws.com/${{env.ECR_REPO}}:${{github.run_number}}
    